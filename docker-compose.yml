version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iagi-geosea-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pitiagic_geosea
      - DB_USERNAME=pitiagic_geosea_admin
      - DB_PASSWORD=Wagyu312226
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=file
      - CACHE_STORE=file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iagi-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iagi-geosea-queue
    restart: unless-stopped
    entrypoint: []
    command: [ "php", "artisan", "queue:work", "database", "--sleep=3", "--tries=3", "--max-time=3600" ]
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pitiagic_geosea
      - DB_USERNAME=pitiagic_geosea_admin
      - DB_PASSWORD=Wagyu312226
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=file
      - CACHE_STORE=file
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iagi-network

  db:
    image: mysql:8.0
    container_name: iagi-geosea-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pitiagic_geosea
      MYSQL_USER: pitiagic_geosea_admin
      MYSQL_PASSWORD: Wagyu312226
    volumes:
      - db-data:/var/lib/mysql
      - ./pitiagic_geosea.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iagi-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: iagi-geosea-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iagi-network

networks:
  iagi-network:
    driver: bridge

volumes:
  db-data:
